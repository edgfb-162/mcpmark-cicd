name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Triage issue and manage labels
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const issueTitle = context.payload.issue.title.toLowerCase();
            const issueBody = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : '';

            // Define required labels
            const requiredLabels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: '0e8a16', description: 'Medium priority issue' },
              { name: 'priority-low', color: 'e99695', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '1d76db', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '006b75', description: 'Issue created by first-time contributor' }
            ];

            // Create labels if they don't exist
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: issue.owner,
                    repo: issue.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                }
              }
            }

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-triage']
            });

            // Add category label based on title
            let categoryLabel = null;
            if (issueTitle.includes('bug')) {
              categoryLabel = 'bug';
            } else if (issueTitle.includes('epic')) {
              categoryLabel = 'epic';
            } else if (issueTitle.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }

            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
            }

            // Determine priority label
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityLabel = 'priority-medium'; // default
            for (const { keywords, label } of priorityKeywords) {
              const hasKeyword = keywords.some(k => issueTitle.includes(k) || issueBody.includes(k));
              if (hasKeyword) {
                priorityLabel = label;
                break; // highest priority wins
              }
            }

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    if: contains(toLower(github.event.issue.title), 'epic')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create epic sub-tasks
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const parentTitle = context.payload.issue.title;
            const parentNumber = issue.number;

            // Define sub-tasks
            const subTasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create sub-issues and collect their numbers
            const subIssueNumbers = [];
            for (let i = 0; i < subTasks.length; i++) {
              const task = subTasks[i];
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${task.name}`;
              const subBody = `Related to #${parentNumber}`;

              const subIssue = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.data.number);
            }

            // Update parent issue body with checklist
            const parentBody = context.payload.issue.body || '';
            const checklist = `\n\n## Epic Tasks\n${subIssueNumbers.map(num => `- [ ] #${num}`).join('\n')}`;
            const newParentBody = parentBody + checklist;

            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: parentNumber,
              body: newParentBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-response and update issue
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const issueAuthor = context.payload.issue.user.login;
            const issueLabels = context.payload.issue.labels.map(l => l.name.toLowerCase());

            // Check if author's first issue in this repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              creator: issueAuthor,
              state: 'all'
            });

            const isFirstIssue = authorIssues.data.length === 1; // this is the only one
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });

              // Welcome message
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: `Welcome @${issueAuthor}! This is your first issue in this repository. We appreciate your contribution and will review it as soon as possible.`
              });
            }

            // Determine response based on issue type
            let response = '';
            if (issueLabels.includes('bug')) {
              response = '### Bug Report Guidelines\nPlease ensure you have provided:\n1. Clear description of the bug\n2. Steps to reproduce\n3. Expected vs actual behavior\n4. Environment details (Node.js version, OS, etc.)\n\nWe will investigate this bug report promptly.';
            } else if (issueLabels.includes('epic')) {
              response = '### Feature Request Process\nThis epic will be broken down into sub-tasks (you can see them below). Each sub-task will be reviewed and implemented separately. We appreciate your feature request!';
            } else if (issueLabels.includes('maintenance')) {
              response = '### Maintenance Guidelines\nPlease ensure you have outlined:\n1. Scope of maintenance work\n2. Impact on existing functionality\n3. Timeline for completion\n\nWe will review this maintenance request and prioritize it accordingly.';
            }

            // Post response if not empty
            if (response) {
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: response
              });
            }

            // Set milestone for high/critical priority
            if (issueLabels.includes('priority-high') || issueLabels.includes('priority-critical')) {
              try {
                // List milestones to find v1.0.0
                const milestones = await github.rest.issues.listMilestones({
                  owner: issue.owner,
                  repo: issue.repo,
                  state: 'open'
                });
                const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
                let milestoneNumber;
                if (v1Milestone) {
                  milestoneNumber = v1Milestone.number;
                } else {
                  // Create milestone
                  const newMilestone = await github.rest.issues.createMilestone({
                    owner: issue.owner,
                    repo: issue.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 milestone'
                  });
                  milestoneNumber = newMilestone.data.number;
                }
                // Assign milestone
                await github.rest.issues.update({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  milestone: milestoneNumber
                });
              } catch (error) {
                console.error('Error setting milestone:', error);
              }
            }

            // Change status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });